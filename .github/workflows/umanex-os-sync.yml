name: Sync umanex-os layer

# Ontvangt een repository_dispatch vanuit umanex-os wanneer de globale CLAUDE.md,
# een profile, het sync-script of de LEARNINGS-template wijzigt, en opent een PR met
# de bijgewerkte umanex-os-laag. Alle inhoud komt mee in de payload (base64), zodat
# deze repo geen leestoegang tot de private umanex-os repo nodig heeft.
#
# Wat deze workflow schrijft (alle uit de payload):
#   - .umanex-os/CLAUDE.md, .umanex-os/profiles/<profile>.md   globale laag
#   - .umanex-os/profile                                        marker voor scripts/sync-os.sh
#   - scripts/sync-os.sh                                        canoniek sync-script
#   - LEARNINGS.md in root + elke apps/*                        capture-staging, seed-if-absent
#
# Skills worden NIET via CI gesynct: die staan user-level (~/.claude/skills) en komen
# via het lokale scripts/sync-os.sh. GitHub Actions kan niet naar de runner-home schrijven.
#
# Deze workflow kan zichzelf niet updaten — GitHub weigert workflow-wijzigingen met de
# default GITHUB_TOKEN. Nieuwe versies van deze receiver gaan via een handmatige PR.
#
# Canonieke bron: umanex-os/templates/umanex-os-sync.yml — wijzig daar, niet hier.

on:
  repository_dispatch:
    types: [umanex-os-sync]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Schrijf umanex-os laag uit payload en open PR
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_MD_B64: ${{ github.event.client_payload.claude_md_b64 }}
          PROFILE_B64: ${{ github.event.client_payload.profile_b64 }}
          PROFILE_NAME: ${{ github.event.client_payload.profile_name }}
          SYNC_SCRIPT_B64: ${{ github.event.client_payload.sync_script_b64 }}
          LEARNINGS_TEMPLATE_B64: ${{ github.event.client_payload.learnings_template_b64 }}
        run: |
          set -euo pipefail
          if [ -z "${PROFILE_NAME:-}" ] || [ -z "${CLAUDE_MD_B64:-}" ]; then
            echo "Onvolledige payload — afgebroken."; exit 1
          fi

          # Globale laag
          mkdir -p .umanex-os/profiles
          printf '%s' "$CLAUDE_MD_B64" | base64 -d > .umanex-os/CLAUDE.md
          printf '%s' "$PROFILE_B64"   | base64 -d > ".umanex-os/profiles/${PROFILE_NAME}.md"

          # Marker voor het lokale scripts/sync-os.sh
          printf '%s\n' "$PROFILE_NAME" > .umanex-os/profile

          # Canoniek sync-script (indien meegestuurd)
          if [ -n "${SYNC_SCRIPT_B64:-}" ]; then
            mkdir -p scripts
            printf '%s' "$SYNC_SCRIPT_B64" | base64 -d > scripts/sync-os.sh
            chmod +x scripts/sync-os.sh
          fi

          # LEARNINGS-seed in root + elke app — alleen als afwezig, nooit overschrijven
          if [ -n "${LEARNINGS_TEMPLATE_B64:-}" ]; then
            TMP_TEMPLATE="$(mktemp)"
            printf '%s' "$LEARNINGS_TEMPLATE_B64" | base64 -d > "$TMP_TEMPLATE"
            seed() { [ -f "$1/LEARNINGS.md" ] || cp "$TMP_TEMPLATE" "$1/LEARNINGS.md"; }
            seed "."
            if [ -d apps ]; then
              for d in apps/*/; do [ -d "$d" ] && seed "${d%/}"; done
            fi
            rm -f "$TMP_TEMPLATE"
          fi

          # Drift-check: alles stagen en kijken of er iets veranderde
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Geen drift — umanex-os laag is al up-to-date."
            exit 0
          fi

          BRANCH="chore/sync-umanex-os"
          git switch -c "$BRANCH"
          git commit -m "chore: sync umanex-os layer with global umanex-os"
          git push -f origin "$BRANCH"

          if gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q OPEN; then
            echo "Bestaande open PR bijgewerkt via push."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore: sync umanex-os layer with global umanex-os" \
              --body "Automatische sync van de umanex-os laag (CLAUDE.md, profile, marker, sync-script, LEARNINGS-seed), getriggerd door een wijziging in umanex-os. Skills komen via het lokale scripts/sync-os.sh. Review en merge wanneer je wil."
          fi
